wallet:
  signature_type: 1

paper_balance: 1000

scanner:
  scan_interval_seconds: 300
  min_entry_price: 0.94             # P1: Tightened from 0.90 — $0.90-0.93 are junk bonds
  max_entry_price: 0.98              # V4 P1.5 (tuned): re-opened 0.975-0.98 band — post-only maker entries (V4 1.3) zeroed entry fees, which was the prior V3 rejection rationale

  # V4 Phase 2.2: Category-specific entry bands. Fee-free / low-fee categories
  # get wider bands; others fall back to the global min_entry_price/max_entry_price.
  # Gated by feature flag `category_entry_bands` (default off → shadow mode only).
  entry_band_by_category:
    Geopolitics:
      min: 0.93
      max: 0.985
    Politics:
      min: 0.935
      max: 0.980
  max_days_to_resolution: 14
  preferred_resolution_hours: 72
  min_liquidity: 10000             # V4 P1.5 (tuned): 15000 starved pipeline; 10000 keeps thin-market teleport risk out while restoring candidate flow
  min_volume_24h: 7500             # V4 P1.5: was 2500
  max_price_volatility_1d: 0.05
  volume_trend_min_ratio: 0.70      # P1: 24h volume must be >= 70% of 7d daily avg
  time_filter_weekend_multiplier: 2.0  # P3: Liquidity multiplier on weekends
  time_filter_offpeak_multiplier: 1.5  # P3: Liquidity multiplier off-peak hours
  excluded_categories:
    - "15-min Crypto"
    - "1-hr Crypto"
    - "Live Sports"
    - "Sports"
    - "E-Sports"
    - "Esports"

risk:
  max_single_market_pct: 0.06        # V3: Hard cap 6% (was 12%)
  target_position_pct: 0.04          # V3: Target 4% (was 8%) — ~quarter Kelly for n=18
  max_correlated_pct: 0.25          # Max 25% in same event group
  max_category_exposure_pct: 0.35   # Max 35% in same Polymarket category
  max_deployed_pct: 0.80            # Max 80% total deployment
  max_absolute_position: 5000       # Hard cap in USDC
  max_daily_loss_pct: 0.05          # Halt new entries if daily losses >= 5%
  consecutive_loss_halt: 5          # P1: Reduced from 8 — triggers earlier to limit damage
  consecutive_loss_cooldown_hours: 6 # Resume trading after N hours of circuit breaker
  max_slippage_pct: 0.03            # Reject if estimated entry slippage > 3%
  volume_size_max_pct: 0.05         # Max 5% of 24h volume per position (A5)
  min_viable_position: 15           # Minimum position worth taking (USDC)
  min_net_yield: 0.010              # Global floor; per-category gates below add risk-adjusted overlays

  # V4 Phase 2.1: Category-specific min net yield. Global gate is permissive
  # (0.010) so safe low-fee categories (Geopolitics, Politics, Sports) can
  # qualify on modest yield; per-category mins ratchet up for higher-risk
  # categories (Crypto: high fees + volatility; Mentions: subjective UMA
  # resolution). Each entry must be ≥ global, and is clamped at
  # `min_net_yield - 0.005` (hard floor 0.005). Gated by feature flag
  # `category_min_yield` (default off → shadow mode only).
  min_net_yield_by_category:
    Geopolitics: 0.010    # low fees, clean state-actor resolutions
    Politics: 0.011       # generally clean resolution, low fees
    Sports: 0.011         # high volume + liquidity, clean resolutions
    Tech: 0.013           # smaller markets, thinner books
    Finance: 0.013        # moderate fees + volatility
    Culture: 0.014        # subjective resolution criteria
    Weather: 0.014        # subjective ("did it rain") — UMA-prone
    Economics: 0.015      # Fed/CPI clustering — multi-bond catalyst risk
    Mentions: 0.018       # highly subjective ("did X say Y") — UMA-prone
    Crypto: 0.020         # highest fees + price volatility
    _unknown: 0.015       # defensive default for un-tagged markets

  # V4 Phase 2.4: Resolution-date clustering cap — reject if adding this position
  # would make more than this fraction of deployed capital resolve within the
  # cluster window. Prevents a single catalyst (Fed day, election night) from
  # taking down multiple bonds simultaneously.
  resolution_date_cluster_pct: 0.25
  resolution_date_cluster_window_hours: 24
  # V4 P1.5: Correlated-underlying concentration — caps concurrent exposure
  # to a single asset (BTC/ETH/SOL/NVDA/etc.) across its strike/date variants.
  # Tuned 2→3: in BTC-dominated candidate windows, cap of 2 stranded capital.
  # 3 still keeps us 3× safer than pre-P1.5 (9-concurrent disaster was the trigger).
  max_positions_per_underlying: 3
  # V4 P1.5: After a stop-out/teleportation on an underlying, reject new
  # entries on that same underlying for this many hours (prevents compounding
  # during regime shifts).
  underlying_cooldown_hours: 6

exits:
  # Stop loss
  stop_loss_pct: 0.10               # Default stop-loss (overridden by tiered below)
  stop_loss_urgency: "immediate"    # Always use market order for stop-loss

  # V4 P1.5: Widened tiered stop-loss — previous tight stops (3-5%) were
  # triggering on normal 3-7 day noise, producing 46% of all exits at a net
  # loss while only 7.7% of trades actually reached resolution. These wider
  # tiers let the bond thesis play out while still blocking genuine breakdowns.
  tiered_stop_loss:
    - min_entry: 0.98
      stop_loss_pct: 0.08    # was 0.05 — high-conviction bonds, sleep thru 8%
    - min_entry: 0.96
      stop_loss_pct: 0.07    # was 0.04 — sweet-spot, weather 7% noise
    - min_entry: 0.94
      stop_loss_pct: 0.06    # was 0.03 — thinner margin, 6% tolerance
    - min_entry: 0.90
      stop_loss_pct: 0.05    # was 0.025 — protect capital at 5%

  # V4 P1.5: Minimum hold time before stop-loss / trailing-stop can fire.
  # Teleportation, revalidation-failed, and resolution-win still fire instantly.
  # Previous rapid stop-outs (9-13 min after entry) suggest spread widening /
  # transient liquidity gaps were triggering real exits on non-signal noise.
  entry_grace_period_hours: 2

  # Take profit (bond-specific)
  bond_take_profit_price: 0.995     # Consider early exit when price >= $0.995
  bond_take_profit_min_hours_to_resolution: 48  # Only if resolution > 48h away
  generic_take_profit_pct: 0.10     # 10% take-profit for non-bond positions

  # Time-based exit
  max_holding_days: 14              # Default max holding (dynamic extension up to 14 for known resolutions)
  stale_resolution_hours: 48        # Flag if resolution date passed by >48h

  # Partial scaling (default OFF for bond strategy)
  partial_scaling_enabled: false
  partial_close_trigger_pct: 0.08   # Close 50% at +8%
  partial_close_pct: 0.50
  partial_remainder_target_pct: 0.15

  # Portfolio-level exits
  portfolio_drawdown_alert_pct: 0.05    # Close worst position at -5% drawdown
  portfolio_drawdown_critical_pct: 0.08 # Close bottom 3 positions at -8%
  portfolio_profit_taking_enabled: false
  portfolio_profit_taking_pct: 0.03

  # Trailing stop (A6 — activates near resolution price)
  trailing_stop_activation_price: 0.995  # Activate when price >= this
  trailing_stop_distance_pct: 0.005      # Trail 0.5% below high-water mark

  # P2: Post-entry re-validation interval
  revalidation_interval_hours: 4

  # Legacy fields (used by monitor.py for supplemental alert notifications)
  auto_exit_enabled: true
  yellow_alert_threshold: 0.85
  orange_alert_threshold: 0.80
  red_alert_exit_threshold: 0.75
  order_timeout_seconds: 300

# Alert thresholds (notifications only — not exit triggers)
alerts:
  yellow_loss_pct: 0.05             # Notification at 5% loss
  orange_loss_pct: 0.08             # Notification at 8% loss

# Risk bucket caps for correlation clustering (A4)
risk_buckets:
  politics:
    max_bucket_exposure_pct: 0.30
  crypto:
    max_bucket_exposure_pct: 0.30
  macro:
    max_bucket_exposure_pct: 0.30
  sports:
    max_bucket_exposure_pct: 0.25
  culture:
    max_bucket_exposure_pct: 0.20
  science_tech:
    max_bucket_exposure_pct: 0.25
  other:
    max_bucket_exposure_pct: 0.20

orderbook:
  min_bid_depth_multiplier: 3
  max_spread: 0.04
  max_bid_volume_decline_pct: 0.30

notifications:
  enabled: true
  webhook_url: ""
  alert_on_trade: true
  alert_on_warning: true
  alert_on_error: true
  daily_summary: true
  performance_summary: true
  performance_summary_hour_utc: 0   # Hour of day (UTC) to send lifetime summary

# P0: Teleportation slippage protection
teleportation:
  teleportation_max_loss_pct: 0.50        # Absolute max loss before forced market exit
  teleportation_detection_multiplier: 2.0  # drop > stop_loss * this = teleportation
  teleportation_exit_slippage_pct: 0.10    # Wider slippage band for teleport exits

# P0: Orderbook imbalance monitor (live mode only)
orderbook_monitor:
  orderbook_monitor_interval_seconds: 20
  warning_bid_depth_ratio: 2.0
  critical_bid_depth_ratio: 1.0
  exit_bid_depth_ratio: 0.5
  bid_wall_pull_threshold: 0.30

# P1: Binary catalyst classification
binary_catalyst:
  binary_catalyst_reject_threshold: 0.85
  binary_catalyst_penalize_threshold: 0.50
  binary_catalyst_penalty_factor: 0.60

# P1: Price drop cool-down
detector:
  price_drop_cooldown_threshold: -0.03
  price_drop_recovery_ratio: 0.80
  min_parity_sum: 0.96
  max_parity_sum: 1.04

# P2: Adaptive position sizing
# V4 P0 fix: Bounds realigned to stay within max_single_market_pct (0.06) hard cap.
# Centered around target_position_pct (0.04). Previous V3 values (5%-10%) exceeded
# the 6% hard cap and caused the risk engine to reject every adaptive-sized entry.
adaptive_sizing:
  enabled: true
  min_size_pct: 0.025
  max_size_pct: 0.05

# P2: Blacklist learning loop
blacklist_learner:
  enabled: true
  loss_threshold: 3
  window_days: 30

# P3: Resolution proximity scoring
scoring:
  resolution_proximity_decay_rate: 0.3
  use_exponential_proximity: true

# Feature flags — set false to disable without code changes
feature_flags:
  teleportation_detection: true
  orderbook_monitor: true
  binary_catalyst_filter: true
  volume_trend_filter: true
  price_drop_cooldown: true
  adaptive_sizing: true
  secondary_price_validation: true
  post_entry_revalidation: true
  blacklist_learner: true
  exit_fee_optimization: true
  time_of_day_filter: true
  exponential_proximity: true
  # V4 Phase 2 — default off; flip after 24h shadow-mode review per spec §0.2.
  # `shadow_<flag>` runs the filter and logs verdict without enforcing.
  category_min_yield: false
  shadow_category_min_yield: true
  category_entry_bands: false
  shadow_category_entry_bands: true
  resolution_date_cluster: false
  shadow_resolution_date_cluster: true
  holding_rewards_scoring: true      # ranking boost only; safe to enable directly
  lp_rewards_preference: true        # ranking boost only; safe to enable directly

# V4 1.3: Post-only entries. `post_only_ladder` walks best_bid → best_bid+tick
# → midpoint-tick with postOnly=true — zero entry fees guaranteed by rejecting
# orders that would cross. `allow_taker_fallback: false` means failed ladders
# skip the entry rather than fall back to taker (the safer default).
executor:
  entry_strategy: "post_only_ladder"
  post_only_max_attempts: 3
  post_only_retry_wait_sec: 10
  allow_taker_fallback: false
  tick_size: 0.01

# V4 1.2: Dynamic fee model. `use_dynamic_fees: true` switches every net-yield,
# sizing, and EV calculation from the flat 0.2% assumption to the per-market
# Polymarket formula fee = C × Θ × p × (1-p). Category fallback keeps us
# conservative when feeSchedule is missing. `assume_entry_maker` expects
# post-only entries (V4 1.3) and drops entry fee to 0.
fees:
  use_dynamic_fees: true
  fallback_taker_rate: 0.002
  assume_entry_maker: true
  assume_exit_taker: true
  resolution_is_free: true

# V4 1.1: Pipeline health monitor — detects starvation (no entries over a
# dry period) and surfaces top rejection reasons. Auto-relaxation stays OFF
# by default; operator must opt in after reviewing the data.
pipeline_health:
  enabled: true
  warning_dry_period_hours: 12
  critical_dry_period_hours: 18
  starvation_dry_period_hours: 36
  min_acceptance_rate_24h: 0.005
  auto_relaxation:
    enabled: false
    max_entry_price_step: 0.005
    max_entry_price_ceiling: 0.985
    min_net_yield_step: 0.001
    min_net_yield_floor: 0.010
    require_human_ack_after_first_trigger: true

# V4 Phase 2.3: Holding rewards. Polymarket pays 4% APY in USDC on eligible
# positions (markets with `holdingRewardsEnabled: true`). The bond-score
# boost and EV model use `apy` directly; `reconciliation_enabled` controls
# whether the daily job hits the Data API for live-mode attribution.
holding_rewards:
  apy: 0.04
  reconciliation_enabled: false        # live mode only; stub in paper
  api_base_url: "https://data-api.polymarket.com"
  reconciliation_interval_hours: 24

# V4 Phase 2.5: LP-rewards ranking preference. Markets with active LP rewards
# (`clobRewards[].rewardsDailyRate > lp_rewards_min_daily_rate`) get a 1.15×
# bond-score boost — they have deeper books and tighter spreads, which
# reduces slippage on entry/exit even when we're not capturing the LP reward
# ourselves (that requires two-sided quoting, deferred to V5).
lp_rewards:
  score_boost: 1.15
  min_daily_rate: 100

logging:
  level: INFO
  file: "logs/bond_bot.log"
  max_size_mb: 50
  backup_count: 5
  db_path: "data/bond_bot.db"
